<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprendiendo Inglés - Footprints Bolivia</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Librería para generar PDFs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f0f9ff;
            touch-action: manipulation;
        }
        .card {
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 2rem;
            background: white;
        }
        .btn-bounce:active {
            transform: scale(0.95);
        }
        .word-display {
            font-size: 5rem;
            letter-spacing: 0.2rem;
            color: #1e40af;
            min-height: 8rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .progress-bar {
            transition: width 0.3s ease-in-out;
        }
        .mic-active {
            animation: pulse-red 1.5s infinite;
            background-color: #fee2e2 !important;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        #progress-modal, #name-modal {
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
        }
        .hidden-word {
            color: #cbd5e1;
            letter-spacing: 0.5rem;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Pantalla de Inicio -->
    <div id="start-screen" class="text-center">
        <h1 class="text-4xl font-bold text-blue-600 mb-6">¡Hola, pequeño lector! 🌟</h1>
        <p class="text-xl text-gray-600 mb-8">¿Estás listo para practicar tus palabras en inglés?</p>
        <button onclick="startGame()" class="bg-yellow-400 hover:bg-yellow-500 text-white font-bold py-4 px-10 rounded-full text-2xl border-b-8 border-yellow-600 btn-bounce">
            ¡COMENZAR! 🚀
        </button>
    </div>

    <!-- Pantalla de Juego -->
    <div id="game-screen" class="hidden w-full max-w-2xl text-center">
        <div class="mb-4 px-4">
            <div class="flex justify-between items-center mb-2">
                <span id="progress-text" class="text-blue-500 font-bold text-sm">Palabra 1 de 65</span>
                <button onclick="toggleProgressModal()" class="text-xs bg-blue-600 text-white px-4 py-2 rounded-full font-bold hover:bg-blue-700 transition shadow-md">
                    Ver Progreso 📊
                </button>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-4 mb-1">
                <div id="progress-bar" class="progress-bar bg-green-400 h-4 rounded-full" style="width: 0%"></div>
            </div>
        </div>

        <div class="card p-8 mb-6 relative">
            <!-- Botón Ojo (Pista) -->
            <button id="eye-btn" onclick="peekWord()" title="Ver palabra un momento" 
                    class="hidden absolute top-6 right-6 bg-yellow-100 p-3 rounded-full hover:bg-yellow-200 transition btn-bounce border-2 border-yellow-400 shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-yellow-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
            </button>

            <div id="phase-indicator" class="text-sm font-bold text-purple-500 uppercase mb-2">Escucha y escribe</div>
            <div id="word-target" class="word-display font-bold mb-6"></div>
            
            <div class="flex justify-center gap-4 mb-6">
                <!-- Botón Escuchar -->
                <button onclick="speakCurrentWord()" title="Escuchar palabra" class="bg-blue-100 p-4 rounded-full hover:bg-blue-200 transition btn-bounce">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                    </svg>
                </button>

                <!-- Botón Hablar (Micrófono) -->
                <button id="mic-btn" onclick="startListening()" title="Hablar palabra" class="bg-red-100 p-4 rounded-full hover:bg-red-200 transition btn-bounce relative">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                    </svg>
                </button>
            </div>

            <div class="max-w-xs mx-auto">
                <input type="text" id="user-input" autocomplete="off" 
                       class="w-full text-3xl text-center border-4 border-blue-200 rounded-xl p-3 focus:border-blue-500 outline-none transition"
                       placeholder="Escribe o habla...">
                <p id="feedback" class="mt-4 font-bold text-lg h-6"></p>
            </div>
        </div>

        <button id="next-btn" onclick="handleKeyboardCheck()" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-full text-xl shadow-lg btn-bounce">
            CONTINUAR →
        </button>
    </div>

    <!-- Modal de Nombre -->
    <div id="name-modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl">
            <h3 class="text-2xl font-bold text-blue-700 mb-4">¿Cuál es tu nombre? 📝</h3>
            <input type="text" id="student-name-input" class="w-full border-2 border-blue-200 rounded-xl p-3 mb-6 text-center outline-none focus:border-blue-500 text-xl" placeholder="Escribe tu nombre aquí">
            <div class="flex gap-3">
                <button onclick="closeNameModal()" class="flex-1 bg-gray-200 text-gray-600 font-bold py-3 rounded-xl">Cancelar</button>
                <button onclick="generatePDF()" class="flex-1 bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg">Descargar</button>
            </div>
        </div>
    </div>

    <!-- Modal de Progreso Detallado -->
    <div id="progress-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-xl max-h-[85vh] overflow-hidden flex flex-col shadow-2xl">
            <div class="p-6 border-b flex justify-between items-center bg-blue-50">
                <div>
                    <h3 class="text-2xl font-bold text-blue-700">Detalle de Práctica 📉</h3>
                    <p class="text-xs text-blue-500 uppercase font-bold tracking-widest">Análisis Detallado de Errores</p>
                </div>
                <button onclick="toggleProgressModal()" class="text-gray-400 hover:text-red-500 text-3xl font-bold">&times;</button>
            </div>
            <div class="p-4 overflow-y-auto grid grid-cols-1 gap-3" id="word-status-list">
                <!-- Dinámico -->
            </div>
            <div class="p-4 border-t bg-gray-50 flex flex-col gap-3">
                <button onclick="toggleProgressModal()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-full shadow-lg transition btn-bounce">
                    Volver a practicar
                </button>
                <button onclick="openNameModal()" class="bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-3 rounded-full shadow-lg transition btn-bounce flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M6 2a2 2 0 00-2 2v12a2 2 0 002 2h8a2 2 0 002-2V7.414A2 2 0 0015.414 6L12 2.586A2 2 0 0010.586 2H6.414l4.586-4.586zM6 11a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd" />
                    </svg>
                    Descargar PDF Reporte 📄
                </button>
            </div>
        </div>
    </div>

    <!-- Pantalla Final -->
    <div id="end-screen" class="hidden text-center w-full max-w-2xl">
        <h2 class="text-4xl font-bold text-blue-600 mb-4">¡Felicidades! 🎉</h2>
        <div class="card p-8 mb-8 text-left">
            <h3 class="text-2xl font-bold mb-4 text-gray-700">Resumen de Práctica:</h3>
            <div id="stats-container" class="space-y-2 text-lg"></div>
        </div>
        <div class="flex flex-col gap-4">
            <button onclick="sendReport()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-full text-xl shadow-lg">
                Enviar reporte al Director 📧
            </button>
            <button onclick="location.reload()" class="text-gray-500 font-bold">Volver a empezar</button>
        </div>
    </div>

    <script>
        const words = ["an", "at", "can", "cat", "had", "man", "the", "and", "a", "fat", "bat", "mat", "chat"];
        const repetitionsPerWord = 5;
        
        let gameQueue = [];
        let currentIndex = 0;
        
        // Identificación de errores por tipo
        let errorsKeyboard = {};
        let errorsVoice = {};
        
        let currentErrorsInSession = 0; 
        let successfulAttempts = {};
        let voiceSuccess = {};
        let keyboardSuccess = {};
        let isListening = false;
        let isPeeking = false;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        words.forEach(w => {
            errorsKeyboard[w] = 0;
            errorsVoice[w] = 0;
            successfulAttempts[w] = 0;
            voiceSuccess[w] = 0;
            keyboardSuccess[w] = 0;
        });

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.continuous = false; 
            recognition.interimResults = true; 

            recognition.onstart = () => {
                isListening = true;
                document.getElementById('mic-btn').classList.add('mic-active');
                document.getElementById('feedback').innerText = "Escuchando... 👂";
                document.getElementById('feedback').className = "mt-4 font-bold text-lg h-6 text-blue-400";
            };

            recognition.onresult = (event) => {
                const speechResult = event.results[0][0].transcript.toLowerCase();
                document.getElementById('user-input').value = speechResult;
                if (event.results[0].isFinal) setTimeout(() => checkWord('voice'), 200);
            };

            recognition.onend = () => {
                isListening = false;
                document.getElementById('mic-btn').classList.remove('mic-active');
            };

            recognition.onerror = () => {
                isListening = false;
                document.getElementById('mic-btn').classList.remove('mic-active');
            };
        }

        function startGame() {
            let initialPool = [];
            words.forEach(w => { for(let i=0; i < repetitionsPerWord; i++) initialPool.push(w); });
            gameQueue = shuffle(initialPool);
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            updateUI();
        }

        function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

        function toggleProgressModal() {
            const modal = document.getElementById('progress-modal');
            const list = document.getElementById('word-status-list');
            if (modal.classList.contains('hidden')) {
                let html = "";
                const currentTargetWord = gameQueue[currentIndex];
                words.forEach(word => {
                    const done = successfulAttempts[word];
                    const left = Math.max(0, repetitionsPerWord - done);
                    const errK = errorsKeyboard[word];
                    const errV = errorsVoice[word];
                    const vOk = voiceSuccess[word];
                    const kOk = keyboardSuccess[word];
                    const isCurrent = (word === currentTargetWord);
                    let statusColor = done >= 5 ? "bg-green-50" : (isCurrent ? "bg-blue-50 border-blue-200" : "bg-gray-50");
                    html += `
                        <div class="p-3 rounded-2xl border ${statusColor} flex flex-col gap-2">
                            <div class="flex justify-between items-center border-b pb-1">
                                <span class="font-bold text-gray-800">${word.toUpperCase()}</span>
                                <span class="text-[10px] font-bold px-2 py-0.5 rounded-full ${done >= 5 ? 'bg-green-200 text-green-700' : 'bg-gray-200 text-gray-500'}">
                                    ${done >= 5 ? 'LISTA' : 'FALTAN ' + left}
                                </span>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div class="bg-white rounded-xl p-2 text-center border">
                                    <p class="text-[9px] uppercase font-bold text-blue-500 mb-1">Entrada ⌨️/🎤</p>
                                    <div class="flex justify-around">
                                        <div class="text-[10px]">Teclado: <b>${kOk}</b></div>
                                        <div class="text-[10px]">Voz: <b>${vOk}</b></div>
                                    </div>
                                </div>
                                <div class="bg-red-50 rounded-xl p-2 text-center border border-red-100">
                                    <p class="text-[9px] uppercase font-bold text-red-500 mb-1">Errores ❌</p>
                                    <div class="flex justify-around">
                                        <div class="text-[10px]">Teclado: <b class="${errK > 0 ? 'text-red-600' : 'text-gray-400'}">${errK}</b></div>
                                        <div class="text-[10px]">Voz: <b class="${errV > 0 ? 'text-red-600' : 'text-gray-400'}">${errV}</b></div>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                });
                list.innerHTML = html;
                modal.classList.remove('hidden');
            } else { modal.classList.add('hidden'); }
        }

        function openNameModal() { document.getElementById('name-modal').classList.remove('hidden'); }
        function closeNameModal() { document.getElementById('name-modal').classList.add('hidden'); }

        async function generatePDF() {
            const studentName = document.getElementById('student-name-input').value.trim() || "Estudiante";
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const date = new Date().toLocaleDateString();

            doc.setFont("helvetica", "bold");
            doc.setFontSize(18);
            doc.setTextColor(30, 64, 175);
            doc.text("REPORTE PEDAGÓGICO DE INGLÉS", 105, 15, { align: "center" });
            
            doc.setFontSize(10);
            doc.setTextColor(100);
            doc.text("Análisis de Lectoescritura y Fonética - Footprints Bolivia", 105, 21, { align: "center" });

            doc.setDrawColor(200);
            doc.line(15, 26, 195, 26);
            doc.setFontSize(10);
            doc.setTextColor(0);
            doc.text(`Alumno: ${studentName}`, 15, 32);
            doc.text(`Fecha: ${date}`, 160, 32);

            let yPos = 45;
            // Cabeceras de tabla
            doc.setFillColor(240, 245, 255);
            doc.rect(15, yPos-5, 180, 7, 'F');
            doc.setFontSize(9);
            doc.setFont("helvetica", "bold");
            doc.text("PALABRA", 18, yPos);
            doc.text("ÉXITO TECL.", 55, yPos);
            doc.text("ÉXITO VOZ", 85, yPos);
            doc.setTextColor(180, 0, 0);
            doc.text("ERR. TECL.", 125, yPos);
            doc.text("ERR. VOZ", 165, yPos);
            
            doc.setTextColor(0);
            doc.setFont("helvetica", "normal");
            yPos += 8;

            words.forEach((word) => {
                if (yPos > 280) { doc.addPage(); yPos = 20; }
                
                const vOk = voiceSuccess[word];
                const kOk = keyboardSuccess[word];
                const errK = errorsKeyboard[word];
                const errV = errorsVoice[word];

                doc.text(word.toUpperCase(), 18, yPos);
                doc.text(kOk.toString(), 63, yPos, {align: "center"});
                doc.text(vOk.toString(), 93, yPos, {align: "center"});

                // Colores para errores
                if (errK > 0) doc.setTextColor(200, 0, 0);
                else doc.setTextColor(150);
                doc.text(errK.toString(), 135, yPos, {align: "center"});

                if (errV > 0) doc.setTextColor(200, 0, 0);
                else doc.setTextColor(150);
                doc.text(errV.toString(), 175, yPos, {align: "center"});
                
                doc.setTextColor(0);
                doc.setDrawColor(240);
                doc.line(15, yPos + 2, 195, yPos + 2);
                yPos += 7;
            });

            doc.setFontSize(8);
            doc.setTextColor(120);
            doc.text("* El reporte permite identificar si el estudiante tiene mayor dificultad en la memoria ortográfica (Teclado) o en la fonética (Voz).", 15, 285);

            doc.save(`Reporte_Ingles_${studentName.replace(/\s+/g, '_')}.pdf`);
            closeNameModal();
        }

        function updateUI() {
            const currentWord = gameQueue[currentIndex];
            const displayEl = document.getElementById('word-target');
            const indicatorEl = document.getElementById('phase-indicator');
            
            document.getElementById('user-input').value = "";
            document.getElementById('feedback').innerText = "";
            
            const count = successfulAttempts[currentWord];
            if (count === 0) {
                displayEl.innerText = currentWord;
                displayEl.classList.remove('hidden-word');
                indicatorEl.innerText = "Mira, escucha y escribe";
            } else {
                displayEl.innerText = "_ ".repeat(currentWord.length).trim();
                displayEl.classList.add('hidden-word');
                indicatorEl.innerText = "Escucha y escribe de memoria";
            }

            currentErrorsInSession = 0;
            document.getElementById('eye-btn').classList.add('hidden');

            const total = gameQueue.length;
            const currentNum = currentIndex + 1;
            document.getElementById('progress-text').innerText = `Palabra ${currentNum} de ${total}`;
            document.getElementById('progress-bar').style.width = `${(currentNum / total) * 100}%`;
            
            speakCurrentWord();
            document.getElementById('user-input').focus();
        }

        function peekWord() {
            if (isPeeking) return;
            const currentWord = gameQueue[currentIndex];
            const displayEl = document.getElementById('word-target');
            
            isPeeking = true;
            displayEl.innerText = currentWord;
            displayEl.classList.remove('hidden-word');
            
            setTimeout(() => {
                if (successfulAttempts[currentWord] > 0) {
                    displayEl.innerText = "_ ".repeat(currentWord.length).trim();
                    displayEl.classList.add('hidden-word');
                }
                isPeeking = false;
            }, 2000); 
        }

        function speakCurrentWord() {
            const word = gameQueue[currentIndex];
            if (!word) return;
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
        }

        function startListening() {
            if (!recognition) return;
            document.getElementById('user-input').value = "";
            if (isListening) { recognition.stop(); return; }
            try { recognition.start(); } catch (e) { isListening = false; }
        }

        function handleKeyboardCheck() {
            checkWord('keyboard');
        }

        function checkWord(method) {
            const target = gameQueue[currentIndex].toLowerCase().trim();
            const inputEl = document.getElementById('user-input');
            const input = inputEl.value.toLowerCase().trim();
            const feedback = document.getElementById('feedback');
            
            if (!input) return;

            const cleanInput = input.replace(/[\.\?\!]/g, "").trim();
            let isCorrect = (cleanInput === target);

            // Ayudas fonéticas
            if (target === "a" && ["ay", "uh", "hey", "the", "8", "i"].includes(cleanInput)) isCorrect = true;
            if (target === "an" && ["and", "anne", "in", "am", "on"].includes(cleanInput)) isCorrect = true;
            if (target === "the" && ["the", "thee", "de", "di", "a"].includes(cleanInput)) isCorrect = true;

            if (isCorrect) {
                successfulAttempts[target]++;
                if (method === 'voice') voiceSuccess[target]++;
                else keyboardSuccess[target]++;

                feedback.innerText = "¡Excelente! ✨";
                feedback.className = "mt-4 font-bold text-lg h-6 text-green-500";
                setTimeout(nextWord, 800);
            } else {
                // Registrar error según el método
                if (method === 'voice') errorsVoice[target]++;
                else errorsKeyboard[target]++;
                
                currentErrorsInSession++;
                
                // Limpiar input
                inputEl.value = "";

                if (currentErrorsInSession >= 3) {
                    document.getElementById('eye-btn').classList.remove('hidden');
                }

                feedback.innerText = "¡Intenta de nuevo! 💡";
                feedback.className = "mt-4 font-bold text-lg h-6 text-red-500";
                speakCurrentWord();
            }
        }

        function nextWord() {
            currentIndex++;
            if (currentIndex < gameQueue.length) updateUI();
            else showEndScreen();
        }

        function showEndScreen() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            const stats = document.getElementById('stats-container');
            stats.innerHTML = `<p class="font-bold text-green-600 underline text-xl">¡Sesión Terminada!</p>
            <p class="text-sm mt-3 text-gray-600">Revisa el panel de progreso detallado antes de descargar tu reporte.</p>`;
        }

        function sendReport() {
            const recipient = "director@footprints.edu.bo";
            const subject = "Reporte Pedagógico de Inglés - Análisis por Canal";
            let body = "Resumen de sesión (Errores Separados):\n\n";
            words.forEach(w => {
                body += `${w.toUpperCase()}: \n - Éxito Teclado: ${keyboardSuccess[w]} | Errores Teclado: ${errorsKeyboard[w]}\n - Éxito Voz: ${voiceSuccess[w]} | Errores Voz: ${errorsVoice[w]}\n\n`;
            });
            window.location.href = `mailto:${recipient}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => { 
            if (e.key === 'Enter') handleKeyboardCheck(); 
        });
    </script>
</body>
</html>
